<body>

    <canvas id="trailCanvas"></canvas>

    <div class="content-layer">
        
        <div class="logo">
            <span class="name">unlearn</span><span class="ext">.how</span>
        </div>

        <h1 class="headline">
            <span class="headline-line1">Bevor das Neue kommt,</span>
            <span class="headline-line2">Muss das Alte gehen.</span>
        </h1>
        
        <p class="subline">
            Beratung für Führungskräfte, die ihre Organisation durch die KI-Transformation bringen wollen.
        </p>
        
        <!-- Signup Form -->
        <div class="signup-container">
            <form class="signup-form" id="notifyForm">
                <input type="email" class="signup-input" id="emailInput" placeholder="Geschäftliche E-Mail" required>
                <button type="submit" class="signup-btn" id="submitBtn">Benachrichtigen</button>
            </form>
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg">
                Vielen Dank. Wir halten Sie auf dem Laufenden.
            </div>
        </div>
        
        <!-- Footer Links -->
        <div class="footer-area">
            <div class="project-row">
                <span>Ein Projekt von</span>
                <a href="https://loschke.ai" target="_blank" rel="noopener" class="project-link">Rico Loschke</a>
                <span style="opacity:0.3">•</span>
                <a href="https://loschke.ai" target="_blank" rel="noopener" class="project-domain">loschke.ai</a>
            </div>

            <a href="https://www.linkedin.com/in/ricoloschke/" target="_blank" rel="noopener" class="story-link-subtle">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                    <rect x="2" y="9" width="4" height="12"></rect>
                    <circle cx="4" cy="4" r="2"></circle>
                </svg>
                Die Geschichte dahinter
            </a>
        </div>

    </div>

    <script>
        // --- CANVAS INTERACTION LOGIC ---
        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        let mouse = { x: -100, y: -100 };
        let lastMouse = { x: -100, y: -100 };
        
        const baseHue = 270; 

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 10 + 2; 
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 0.8 + 0.2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.hue = baseHue + (Math.random() - 0.5) * 40; 
                this.life = 140;
                this.decay = Math.random() * 1.0 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                if(this.size > 0.1) this.size -= 0.05;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, ${this.life / 180})`;
                ctx.fill();
            }
        }

        function createParticles(x, y, amount) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y));
            }
        }

        window.addEventListener('mousemove', (e) => {
            lastMouse.x = mouse.x;
            lastMouse.y = mouse.y;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            const dist = Math.hypot(mouse.x - lastMouse.x, mouse.y - lastMouse.y);
            
            if (lastMouse.x > 0) {
                 for(let i=0; i<dist; i+=5) {
                     const progress = i / dist;
                     const lx = lastMouse.x + (mouse.x - lastMouse.x) * progress;
                     const ly = lastMouse.y + (mouse.y - lastMouse.y) * progress;
                     createParticles(lx, ly, 1); 
                 }
            } else {
                createParticles(mouse.x, mouse.y, 4);
            }
        });
        
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouse.x = touch.clientX;
            mouse.y = touch.clientY;
            createParticles(mouse.x, mouse.y, 3);
        }, { passive: true });

        function animate() {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
            ctx.fillRect(0, 0, width, height);
            
            ctx.globalCompositeOperation = 'lighter';
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            
            ctx.globalCompositeOperation = 'source-over';
            requestAnimationFrame(animate);
        }
        animate();

        // --- FORM LOGIC with Listmonk API ---
        const form = document.getElementById('notifyForm');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const btn = document.getElementById('submitBtn');
        const emailInput = document.getElementById('emailInput');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset error state
            errorMsg.style.display = 'none';
            
            const originalText = btn.innerText;
            btn.innerText = '...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            
            try {
                const response = await fetch('https://list.sevenx.cloud/api/public/subscription', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: emailInput.value,
                        list_uuids: ['41a9ee38-1c93-407a-add6-33e0773394be']
                    })
                });
                
                if (response.ok) {
                    form.style.display = 'none';
                    successMsg.style.display = 'block';
                    
                    // Celebration particles
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    createParticles(cx, cy, 50);
                } else {
                    const data = await response.json().catch(() => ({}));
                    throw new Error(data.message || 'Anmeldung fehlgeschlagen');
                }
            } catch (error) {
                btn.innerText = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
                
                // Show error message
                if (error.message.includes('fetch') || error.message.includes('network')) {
                    errorMsg.textContent = 'Netzwerkfehler. Bitte prüfen Sie Ihre Internetverbindung.';
                } else if (error.message.includes('already')) {
                    errorMsg.textContent = 'Diese E-Mail ist bereits registriert.';
                } else {
                    errorMsg.textContent = 'Ein Fehler ist aufgetreten. Bitte versuchen Sie es erneut.';
                }
                errorMsg.style.display = 'block';
            }
        });

    </script>
